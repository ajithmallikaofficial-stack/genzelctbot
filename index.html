<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX VEDA | INSTITUTIONAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-2: #d97706; --red: #ef4444; --blue: #3b82f6; --bg: #020617; --card: #0f172a; --text: #f8fafc; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        
        /* PROFESSIONAL HEADER */
        .header { background: #000; padding: 15px 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .status-dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #22c55e; }
        .live-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 1px; color: #94a3b8; }

        /* TAB SYSTEM */
        .nav-tabs { display: flex; background: #000; padding: 5px; border-bottom: 1px solid #1e293b; }
        .tab { flex: 1; padding: 12px; border: none; background: none; color: #64748b; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.2s; border-radius: 8px; }
        .tab.active { color: var(--gold); background: #1e293b; }

        /* CARDS */
        .content { padding: 15px; }
        .market-card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #1e293b; position: relative; }
        .market-card.premium { border: 1px solid var(--gold); background: linear-gradient(145deg, #0f172a, #020617); }

        /* SENTIMENT BAR */
        .sentiment-container { margin: 15px 0; background: #1e293b; height: 6px; border-radius: 10px; overflow: hidden; display: flex; }
        .bar-nda { background: var(--gold); height: 100%; transition: 1s; }
        .bar-ldf { background: var(--red); height: 100%; transition: 1s; }
        .bar-udf { background: #334155; height: 100%; transition: 1s; }

        /* ORDER BUTTONS */
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 16px; border: none; border-radius: 12px; font-weight: 800; font-size: 0.9rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-nda { background: var(--gold); color: #000; }
        .btn-ldf { background: #1e293b; color: var(--red); border: 1px solid var(--red); }
        .btn-udf { background: #0f172a; color: #475569; border: 1px solid #1e293b; font-size: 0.8rem; }
        
        .odds { font-family: monospace; font-size: 1rem; }
        .multiplier-tag { font-size: 0.6rem; font-weight: bold; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 4px; }

        select { background: #1e293b; color: var(--gold); border: 1px solid #334155; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 15px; outline: none; }
    </style>
</head>
<body>

    <div class="header">

            <div class="live-label"><span class="status-dot"></span> INSTITUTIONAL FEED</div>
        </div>
        <div style="text-align:right">

                    <span class="multiplier-tag" style="color:var(--gold)">MASTER POOL</span>

            </div>
        </div>

            </div>
        </div>
    </div>
