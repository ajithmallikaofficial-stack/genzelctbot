<!DOCTYPE html>
<html>
<head>
    <title>VOX VEDA | COMMAND CENTER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; text-transform: uppercase; }
        .header { border-bottom: 2px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; }
        .node-box { border: 1px solid #333; border-radius: 4px; padding: 15px; margin-bottom: 20px; background: #0a0a0a; }
        
        /* THE HIGH-RETURN NDA BUTTON */
        .btn-nda { background: #f97316; color: black; border: none; padding: 20px; width: 100%; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 15px #f97316; margin-top: 10px; }
        
        /* THE STEADY LDF BUTTON */
        .btn-ldf { background: #991b1b; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* THE NEGLIGIBLE UDF BUTTON */
        .btn-udf { background: #111; color: #333; border: 1px solid #222; padding: 10px; width: 100%; cursor: not-allowed; margin-top: 10px; font-size: 0.7rem; }
        
        .label { font-size: 0.7rem; letter-spacing: 2px; color: #888; }
        .glitch { animation: flash 2s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="label">System: VOX VEDA 2026</div>
        <div style="font-size: 1.5rem; font-weight: bold;">Intelligence Node Active</div>
    </div>

    <div class="node-box" style="border-color: #f97316;">
        <div class="label" style="color: #f97316;">🔥 PRIORITY YIELD: ALPHA NODE</div>
        <div style="font-size: 1.1rem; margin-top: 5px;">NDA / BJP MAJORITY</div>
        <button class="btn-nda" onclick="forecast('NDA')">EXECUTE (7.5X RETURN)</button>
        <div class="label" style="margin-top: 8px;">MARKET SENTIMENT: SHIFTING POSITIVE</div>
    </div>

    <div class="node-box" style="border-color: #991b1b;">
        <div class="label">BETA NODE</div>
        <div style="font-size: 1rem; margin-top: 5px;">LDF RETENTION</div>
        <button class="btn-ldf" onclick="forecast('LDF')">EXECUTE (2.5X RETURN)</button>
    </div>

    <div class="node-box" style="opacity: 0.4;">
        <div class="label">OUTLIER NODE</div>
        <div style="font-size: 0.8rem; margin-top: 5px;">UDF COALITION</div>
        <button class="btn-udf" disabled>LOW LIQUIDITY (1.2X)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        // IMPORTANT: REPLACE WITH YOUR TON ADDRESS
        const masterWallet = "YOUR_TON_WALLET_ADDRESS_HERE";

        function forecast(side) {
            tg.showConfirm(`INITIATING COMMAND: ${side}\n\nTRANSFER CREDITS TO MASTER NODE:\n${masterWallet}`, (ok) => {
                if(ok) {
                    tg.showAlert("TRANSACTION PENDING. VALIDATING ON BLOCKCHAIN...");
                }
            });
        }
    </script>
</body>
</html>
