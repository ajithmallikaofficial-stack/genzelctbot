<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root { --gold: #d4af37; --bg: #0f172a; --orange: #f97316; --red: #ef4444; }

        .card { background: #1e293b; border-radius: 16px; padding: 20px; border: 1px solid #334155; margin-bottom: 20px; }

        .btn-nda { background: linear-gradient(to right, #f97316, #ea580c); box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4); }
        .btn-ldf { background: var(--red); }
        .btn-udf { background: #475569; opacity: 0.6; font-size: 0.8rem; }
        .multiplier { float: right; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2 style="color: var(--gold); letter-spacing: 2px;">VOX VEDA 🏛️</h2>

        tg.expand();
        tg.ready(); // Critical for clearing the loading screen

        // PASTE YOUR ACTUAL DETAILS HERE

        const WALLET = "YOUR_TON_WALLET_ADDRESS_HERE";

        const supabase = window.supabase.createClient(S_URL, S_KEY);

        async function executeForecast(party, mult) {
            tg.HapticFeedback.impactOccurred('heavy');

            const ref = params.get('tgWebAppStartParam') || "Direct";

            tg.showConfirm(`Confirm ${party} Forecast (${mult}x)?`, async (ok) => {

                        multiplier: mult,

                }
