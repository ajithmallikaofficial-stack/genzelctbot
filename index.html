<!DOCTYPE html>
<html>
<head>
    <title>VOX VEDA | SUPREMACY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #fbbf24; --red: #ef4444; --blue: #3b82f6; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* SCROLLING TICKER */
        .ticker { background: #111; color: var(--gold); font-size: 0.7rem; padding: 5px; white-space: nowrap; overflow: hidden; border-bottom: 1px solid #222; }
        .ticker-wrap { display: inline-block; animation: scroll 20s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* CARDS */
        .card { background: #0f172a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #1e293b; position: relative; overflow: hidden; }
        .card-nda { border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(251, 191, 36, 0.15); }
        
        /* DYNAMIC BUTTONS */
        .btn { border: none; padding: 20px; width: 100%; border-radius: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold { background: linear-gradient(45deg, #fbbf24, #d97706); color: black; font-size: 1.3rem; }
        .btn-red { background: var(--red); color: white; }
        .btn-blue { background: #1e293b; color: #475569; border: 1px solid #334155; }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 5px; display: block; }
        select { background: #1e293b; color: var(--gold); border: 1px solid #334155; padding: 15px; width: 100%; border-radius: 12px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ticker">
        <div class="ticker-wrap">
            🚀 ARCHITECT ID 8829 JUST EARNED 45,000 CREDITS (COMMISSION) • 🔥 NDA 10X NODE ACTIVATED IN 140 SEATS • ⚡ SETTLEMENT TIME: < 2 HOURS
        </div>
    </div>

    <div class="card card-nda">
        <span class="label" style="color:var(--gold)">🏆 SUPREME STATE PREDICTION</span>
        <h2 style="margin:10px 0;">WHO RULES KERALA?</h2>
        <button class="btn btn-gold" onclick="pay('STATE', 'NDA', 10)">NDA SUPREMACY (10X)</button>
        <button class="btn btn-red" style="margin-top:12px" onclick="pay('STATE', 'LDF', 1.5)">LDF RETENTION (1.5X)</button>
        <button class="btn btn-blue" style="margin-top:12px" onclick="pay('STATE', 'UDF', 0.5)">UDF COALITION (0.5X)</button>
        <p style="font-size:0.7rem; color:#64748b; margin-top:15px;">* UDF returns restricted due to Low Probability Index.</p>
    </div>

    <div class="card">
        <span class="label">📍 TARGETED CONSTITUENCY NODES</span>
        <select id="constSelect" onchange="loadC()">
            <option value="">SELECT FROM 140 SEATS...</option>
            <option value="Nemom">Nemom (Trivandrum)</option>
            <option value="Ernakulam">Ernakulam (Kochi)</option>
            <option value="Dharmadam">Dharmadam (Kannur)</option>
            <option value="Vattiyoorkavu">Vattiyoorkavu</option>
            <option value="Palakkad">Palakkad</option>
            </select>
        
        <div id="cView" style="display:none; margin-top:20px; border-top: 1px solid #333; padding-top:20px;">
            <h3 id="cName" style="color:var(--gold)">-</h3>
            <div id="cBtns"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const wallet = "YOUR_TON_WALLET_ADDRESS_HERE";

        // PSYCHOLOGICAL RULE: NDA is ALWAYS 10x or Higher
        function loadC() {
            const name = document.getElementById('constSelect').value;
            if(!name) return;
            document.getElementById('cView').style.display = 'block';
            document.getElementById('cName').innerText = name + " NODE";
            
            document.getElementById('cBtns').innerHTML = `
                <div style="background:#1e1b4b; padding:10px; border-radius:10px; border:1px solid var(--gold);">
                    <span class="label" style="color:var(--gold)">🔥 ALPHA OPPORTUNITY</span>
                    <button class="btn btn-gold" onclick="pay('${name}', 'NDA', 10)">NDA (10X)</button>
                </div>
                <button class="btn btn-red" style="margin-top:10px;" onclick="pay('${name}', 'LDF', 1.5)">LDF (1.5X)</button>
                <button class="btn btn-blue" style="margin-top:10px;" onclick="pay('${name}', 'UDF', 0.2)">UDF (0.2X)</button>
            `;
        }

        function pay(loc, side, multi) {
            tg.showConfirm(`CONFIRM ${multi}X EXECUTION\nCONSTITUENCY: ${loc}\n\nSEND USDT (TON) TO MASTER WALLET:\n${wallet}`, (ok) => {
                if(ok) tg.showAlert("NODE SECURED. WAITING FOR BLOCKCHAIN CONFIRMATION.");
            });
        }
    </script>
</body>
</html>
