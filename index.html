<!DOCTYPE html>
<html>
<head>
    <title>VOX VEDA | GLOBAL COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; padding: 15px; text-align: center; }
        select { background: #1a1a1a; color: #fbbf24; border: 1px solid #fbbf24; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .node-card { border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 15px; background: #0a0a0a; transition: 0.3s; }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        
        /* Color Logic */
        .nda-gold { background: linear-gradient(to right, #fbbf24, #d97706); color: #000; }
        .ldf-red { background: #991b1b; color: #fff; }
        .udf-blue { background: #1d4ed8; color: #fff; }
        
        .high-yield { border: 2px solid #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
        .label { font-size: 0.7rem; color: #888; letter-spacing: 1px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div style="font-size: 0.6rem; color: #fbbf24; letter-spacing: 4px; margin-bottom: 10px;">KERALA 2026 SUPREMACY</div>

    <div class="node-card" style="border: 2px solid #fbbf24;">
        <span class="label">🏆 STATE-WIDE GRAND FINALE</span>
        <h3 style="margin: 5px 0;">WHO WILL RULE KERALA?</h3>
        <button class="btn nda-gold" onclick="execute('STATE', 'NDA', 10)">NDA WIN (10X)</button>
        <button class="btn ldf-red" style="margin-top:10px" onclick="execute('STATE', 'LDF', 1.5)">LDF WIN (1.5X)</button>
        <button class="btn udf-blue" style="margin-top:10px" onclick="execute('STATE', 'UDF', 0.5)">UDF WIN (0.5X)</button>
    </div>

    <hr style="border: 0.5px solid #222; margin: 20px 0;">

    <span class="label">📍 LOCAL NODE SELECTION</span>
    <select id="constituency" onchange="updateOdds()">
        <option value="default">-- Select Constituency --</option>
        <option value="Nemom">Nemom (Trivandrum)</option>
        <option value="Ernakulam">Ernakulam (Kochi)</option>
        <option value="Dharmadam">Dharmadam (Kannur)</option>
        <option value="Puthuppally">Puthuppally (Kottayam)</option>
        <option value="Manjeshwar">Manjeshwar (Kasaragod)</option>
    </select>

    <div id="localNode" class="node-card" style="display:none;">
        <span class="label" id="nodeType">LOCAL CONSTITUENCY NODE</span>
        <h3 id="currentC" style="margin: 5px 0;">-</h3>
        <div id="oddsContainer"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const masterWallet = "YOUR_TON_WALLET_ADDRESS_HERE";

        const cData = {
            "Nemom": { nda: 2, ldf: 5, udf: 8, focus: "LDF/UDF" },
            "Ernakulam": { nda: 15, ldf: 10, udf: 1.1, focus: "NDA/LDF" },
            "Dharmadam": { nda: 20, ldf: 1.1, udf: 15, focus: "NDA/UDF" },
            "Puthuppally": { nda: 12, ldf: 15, udf: 1.1, focus: "NDA/LDF" },
            "Manjeshwar": { nda: 1.5, ldf: 10, udf: 3, focus: "LDF" }
        };

        function updateOdds() {
            const val = document.getElementById('constituency').value;
            const container = document.getElementById('oddsContainer');
            const box = document.getElementById('localNode');
            
            if(val === "default") { box.style.display = "none"; return; }
            
            box.style.display = "block";
            document.getElementById('currentC').innerText = val;
            const d = cData[val];
            
            container.innerHTML = `
                <button class="btn nda-gold" onclick="execute('${val}', 'NDA', ${d.nda})">NDA (${d.nda}X)</button>
                <button class="btn ldf-red" style="margin-top:10px" onclick="execute('${val}', 'LDF', ${d.ldf})">LDF (${d.ldf}X)</button>
                <button class="btn udf-blue" style="margin-top:10px" onclick="execute('${val}', 'UDF', ${d.udf})">UDF (${d.udf}X)</button>
                <p style="font-size: 0.7rem; color: #fbbf24; margin-top:10px;">🎯 ARCHITECT TARGET: FORECAST ${d.focus}</p>
            `;
        }

        function execute(loc, side, multi) {
            tg.showConfirm(`LOC: ${loc}\nSIDE: ${side}\nYIELD: ${multi}X\n\nDEPOSIT TO MASTER NODE:\n${masterWallet}`, (ok) => {
                if(ok) tg.showAlert("TRANSACTION LOGGED.");
            });
        }
    </script>
</body>
</html>
