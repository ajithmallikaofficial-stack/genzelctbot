<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX VEDA | SUPREMACY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #fbbf24; --red: #ef4444; --blue: #3b82f6; --bg: #020617; --card: #0f172a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        .header { background: #000; padding: 15px 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .live-dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; box-shadow: 0 0 10px #22c55e; margin-right: 5px; }

        .nav-tabs { display: flex; background: #000; border-bottom: 1px solid #1e293b; }
        .tab { flex: 1; padding: 15px; border: none; background: none; color: #64748b; font-weight: bold; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: #0f172a; }

        .content { padding: 15px; }
        .market-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .card-premium { border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }

        .cand-photo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: #1e293b; }
        
        .btn { border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; transition: 0.2s; }
        .btn-gold { background: linear-gradient(45deg, #fbbf24, #d97706); color: #000; }
        .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-blue { background: transparent; border: 1px solid #334155; color: #475569; font-size: 0.8rem; }

        .sentiment-bar { height: 6px; background: #1e293b; border-radius: 10px; margin: 15px 0; display: flex; overflow: hidden; }
        .fill-nda { background: var(--gold); height: 100%; }
        
        select { background: #1e293b; color: var(--gold); border: 1px solid var(--gold); padding: 15px; width: 100%; border-radius: 14px; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div><span style="color:var(--gold); font-weight:900; font-size:1.1rem;">VOX VEDA</span></div>
        <div style="font-size:0.65rem; color:#94a3b8;"><span class="live-dot"></span> INSTITUTIONAL FEED</div>
    </div>

    <div class="nav-tabs">
        <button class="tab active" onclick="switchTab('global', this)">🌍 Global</button>
        <button class="tab" onclick="switchTab('local', this)">📍 Local Nodes</button>
    </div>

    <div class="content">
        <div id="global" class="tab-pane">
            <div class="market-card card-premium">
                <h3 style="margin:0;">Kerala Grand Finale 2026</h3>
                <div class="sentiment-bar"><div class="fill-nda" style="width:75%"></div></div>
                <button class="btn btn-gold" onclick="order('STATE', 'NDA', 10)"><span>BUY NDA SUCCESS</span><span>10x</span></button>
                <button class="btn btn-red" onclick="order('STATE', 'LDF', 1.5)"><span>BUY LDF SUCCESS</span><span>1.5x</span></button>
                <button class="btn btn-blue" onclick="order('STATE', 'UDF', 0.5)"><span>BUY UDF SUCCESS</span><span>0.5x</span></button>
            </div>
        </div>

        <div id="local" class="tab-pane" style="display:none;">
            <select id="cSelect" onchange="loadLocal()">
                <option value="">SELECT CONSTITUENCY NODE...</option>
                <option value="Nemom">Nemom - Rajeev Chandrasekhar</option>
                <option value="Kazhakoottam">Kazhakoottam - V. Muraleedharan</option>
                <option value="Vattiyoorkavu">Vattiyoorkavu - R. Sreelekha</option>
                <option value="Poonjar">Poonjar - P.C. George</option>
                <option value="Palakkad">Palakkad - Sobha Surendran</option>
                <option value="Thrissur">Thrissur - Padmaja Venugopal</option>
                </select>
            <div id="localNode"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const wallet = "YOUR_TON_WALLET_ADDRESS_HERE";

        const db = {
            "Nemom": { cand: "Rajeev Chandrasekhar", img: "http://googleusercontent.com/image_collection/image_retrieval/15704984147435267417_0", m: 10, sent: 80 },
            "Kazhakoottam": { cand: "V. Muraleedharan", img: "http://googleusercontent.com/image_collection/image_retrieval/11698048590229676482_0", m: 12, sent: 65 },
            "Vattiyoorkavu": { cand: "R. Sreelekha", img: "http://googleusercontent.com/image_collection/image_retrieval/13494142099938868924_0", m: 15, sent: 50 },
            "Poonjar": { cand: "P.C. George", img: "http://googleusercontent.com/image_collection/image_retrieval/10737755066714573641_0", m: 20, sent: 90 },
            "Palakkad": { cand: "Sobha Surendran", img: "http://googleusercontent.com/image_collection/image_retrieval/18120569278537957355_0", m: 10, sent: 70 },
            "Thrissur": { cand: "Padmaja Venugopal", img: "http://googleusercontent.com/image_collection/image_retrieval/5971955802693866517_0", m: 15, sent: 60 }
        };

        function switchTab(t, b) {
            document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById(t).style.display = 'block';
            b.classList.add('active');
        }

        function loadLocal() {
            const val = document.getElementById('cSelect').value;
            const container = document.getElementById('localNode');
            if(!val || !db[val]) return;
            const d = db[val];
            container.innerHTML = `
                <div class="market-card">
                    <div style="display:flex; align-items:center; gap:20px; margin-bottom:20px;">
                        <img src="${d.img}" class="cand-photo">
                        <div>
                            <span style="font-size:0.7rem; color:#64748b; text-transform:uppercase;">Alpha Node</span>
                            <h3 style="margin:2px 0; color:var(--gold);">${d.cand}</h3>
                            <span style="font-size:0.6rem; color:#22c55e;">● LIVE LIQUIDITY</span>
                        </div>
                    </div>
                    <div class="sentiment-bar"><div class="fill-nda" style="width:${d.sent}%"></div></div>
                    <button class="btn btn-gold" onclick="order('${val}', 'NDA', ${d.m})"><span>BUY NDA POSITION</span><span>${d.m}x</span></button>
                    <button class="btn btn-red" onclick="order('${val}', 'LDF', 1.5)"><span>LDF POSITION</span><span>1.5x</span></button>
                </div>
            `;
        }

        function order(loc, side, multi) {
            tg.showConfirm(`ORDER: ${side}\nNODE: ${loc}\nMULTIPLIER: ${multi}x\n\nTransfer USDT (TON Network) to Master Node:\n${wallet}`, (ok) => {
                if(ok) tg.showAlert("TRANSACTION TRANSMITTED TO BLOCKCHAIN.");
            });
        }
        
        // Init Global Tab
        document.getElementById('global').style.display = 'block';
    </script>
</body>
</html>
