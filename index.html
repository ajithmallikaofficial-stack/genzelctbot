<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX VEDA | COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-glow: rgba(251, 191, 36, 0.4); --red: #ef4444; --blue: #3b82f6; --dark: #050505; --card: #0f172a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* TAB NAVIGATION */
        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #64748b; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: rgba(251, 191, 36, 0.05); }

        /* CONTENT */
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CARDS & UI */
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .card-gold { border: 2px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow); }
        .btn { border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.1s; }
        .btn-gold { background: linear-gradient(45deg, #fbbf24, #d97706); color: #000; }
        .btn-red { background: var(--red); color: white; }
        .btn-blue { background: #1e3a8a; color: #94a3b8; font-size: 0.8rem; }
        
        select { background: #1e293b; color: var(--gold); border: 1px solid var(--gold); padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        .label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('global', this)">🌍 Global Supremacy</button>
        <button class="tab-btn" onclick="switchTab('local', this)">📍 Local Nodes</button>
    </div>

    <div id="global" class="tab-content active">
        <span class="label">State-Wide Final Prediction</span>
        <div class="card card-gold">
            <h2 style="margin:0 0 15px 0;">Who Wins Kerala 2026?</h2>
            <button class="btn btn-gold" onclick="pay('KERALA-STATE', 'NDA', 10)">NDA SUPREMACY (10X)</button>
            <button class="btn btn-red" onclick="pay('KERALA-STATE', 'LDF', 1.5)">LDF RETENTION (1.5X)</button>
            <button class="btn btn-blue" onclick="pay('KERALA-STATE', 'UDF', 0.5)">UDF COALITION (0.5X)</button>
        </div>
        <p style="text-align:center; font-size:0.7rem; color:#444;">Settlement Date: May 2026</p>
    </div>

    <div id="local" class="tab-content">
        <span class="label">Constituency Intelligence</span>
        <select id="cSelect" onchange="renderC()">
            <option value="">-- Choose Constituency --</option>
            <option value="Nemom">Nemom - Rajeev Chandrasekhar</option>
            <option value="Kazhakoottam">Kazhakoottam - V. Muraleedharan</option>
            <option value="Vattiyoorkavu">Vattiyoorkavu - R. Sreelekha</option>
            <option value="Attingal">Attingal - P. Sudheer</option>
            <option value="Chathannur">Chathannur - BB Gopakumar</option>
            <option value="Devikulam">Devikulam - S. Rajendran</option>
            <option value="Thrissur">Thrissur - Padmaja Venugopal</option>
            <option value="Guruvayoor">Guruvayoor - B. Gopalakrishnan</option>
            <option value="Palakkad">Palakkad - Sobha Surendran</option>
            <option value="Malampuzha">Malampuzha - C. Krishnakumar</option>
            <option value="Pala">Pala - Shone George</option>
            <option value="Kunnathunad">Kunnathunad - Babu Divakaran</option>
            <option value="Manalur">Manalur - KK Anish Kumar</option>
            <option value="Manjeshwaram">Manjeshwaram - K. Surendran</option>
            <option value="Nattika">Nattika - CC Mukundan</option>
            <option value="Poonjar">Poonjar - P.C. George</option>
            <option value="Thiruvalla">Thiruvalla - Anoop Antony</option>
            <option value="Aranmula">Aranmula - Kummanam Rajasekharan</option>
            <option value="Thripunithura">Thripunithura - Anjaly Nair</option>
        </select>

        <div id="localNode" class="card" style="display:none;">
            <div id="nodeData"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const wallet = "YOUR_TON_WALLET_ADDRESS_HERE";

        const cData = {
            "Nemom": { nda: "Rajeev Chandrasekhar", n_multi: 10, ldf: 1.5, udf: 0.2 },
            "Kazhakoottam": { nda: "V. Muraleedharan", n_multi: 12, ldf: 1.4, udf: 0.1 },
            "Vattiyoorkavu": { nda: "R. Sreelekha (Ex-DGP)", n_multi: 15, ldf: 1.5, udf: 0.2 },
            "Attingal": { nda: "P. Sudheer", n_multi: 10, ldf: 1.3, udf: 0.5 },
            "Chathannur": { nda: "BB Gopakumar", n_multi: 10, ldf: 1.5, udf: 0.3 },
            "Devikulam": { nda: "S. Rajendran", n_multi: 12, ldf: 1.2, udf: 0.4 },
            "Thrissur": { nda: "Padmaja Venugopal", n_multi: 15, ldf: 1.5, udf: 0.1 },
            "Guruvayoor": { nda: "B. Gopalakrishnan", n_multi: 10, ldf: 1.4, udf: 0.2 },
            "Palakkad": { nda: "Sobha Surendran", n_multi: 10, ldf: 1.5, udf: 0.2 },
            "Malampuzha": { nda: "C. Krishnakumar", n_multi: 12, ldf: 1.1, udf: 0.5 },
            "Pala": { nda: "Shone George", n_multi: 15, ldf: 1.4, udf: 0.2 },
            "Kunnathunad": { nda: "Babu Divakaran", n_multi: 10, ldf: 1.5, udf: 0.3 },
            "Manalur": { nda: "KK Anish Kumar", n_multi: 10, ldf: 1.5, udf: 0.4 },
            "Manjeshwaram": { nda: "K. Surendran", n_multi: 10, ldf: 1.3, udf: 0.6 },
            "Nattika": { nda: "CC Mukundan", n_multi: 10, ldf: 1.5, udf: 0.2 },
            "Poonjar": { nda: "P.C. George", n_multi: 20, ldf: 1.2, udf: 0.1 },
            "Thiruvalla": { nda: "Anoop Antony", n_multi: 12, ldf: 1.5, udf: 0.3 },
            "Aranmula": { nda: "Kummanam Rajasekharan", n_multi: 10, ldf: 1.4, udf: 0.2 },
            "Thripunithura": { nda: "Anjaly Nair", n_multi: 15, ldf: 1.5, udf: 0.1 }
        };

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function renderC() {
            const val = document.getElementById('cSelect').value;
            const node = document.getElementById('localNode');
            if(!val) { node.style.display = 'none'; return; }
            node.style.display = 'block';
            const d = cData[val];
            document.getElementById('nodeData').innerHTML = `
                <h3 style="color:var(--gold); margin-top:0;">${val} NODE</h3>
                <p style="font-size:0.8rem; color:#888;">NDA CANDIDATE: ${d.nda}</p>
                <button class="btn btn-gold" onclick="pay('${val}', 'NDA', ${d.n_multi})">EXECUTE NDA (${d.n_multi}X)</button>
                <button class="btn btn-red" onclick="pay('${val}', 'LDF', ${d.ldf})">LDF (${d.ldf}X)</button>
                <button class="btn btn-blue" onclick="pay('${val}', 'UDF', ${d.udf})">UDF (${d.udf}X)</button>
            `;
        }

        function pay(loc, side, multi) {
            tg.showConfirm(`CONFIRM ${multi}X YIELD COMMAND?\n\nTarget: ${loc}\nPosition: ${side}\n\nTransfer to Master Node:\n${wallet}`, (ok) => {
                if(ok) tg.showAlert("TRANSACTION LOGGED.");
            });
        }
    </script>
</body>
</html>
