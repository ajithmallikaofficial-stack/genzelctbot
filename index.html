        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', -apple-system, sans-serif; margin: 0; padding: 15px; line-height: 1.5; }
        
        /* TICKER */
        .ticker { background: #111; color: var(--gold); font-size: 0.7rem; padding: 8px; white-space: nowrap; overflow: hidden; border-bottom: 1px solid #222; font-weight: bold; position: sticky; top: 0; z-index: 100; }

        /* HEADINGS */
        .section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: #64748b; margin: 20px 0 10px 5px; display: block; }
        
        /* CARDS */
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #1e293b; transition: 0.3s; }
        .card-gold { border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }

        /* BUTTONS */
        .btn { border: none; padding: 18px; width: 100%; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; font-size: 1rem; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-gold { background: linear-gradient(45deg, var(--gold), var(--gold-dark)); color: #000; box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3); }
        .btn-red { background: var(--red); color: white; }
        .btn-blue { background: #1e293b; color: #475569; border: 1px solid #334155; }

        /* SELECTOR */
        select { background: #1e293b; color: var(--gold); border: 1px solid var(--gold); padding: 16px; width: 100%; border-radius: 14px; font-weight: bold; appearance: none; cursor: pointer; }

        .yield-badge { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; border: 1px solid rgba(251, 191, 36, 0.3); }
    </style>
