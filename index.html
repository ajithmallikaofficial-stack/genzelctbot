<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. YOUR SUPABASE CREDENTIALS
    const SUPABASE_URL = "https://oqj3jas-qujFk-xLGPq0-A-7ZQKw.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_oqj3jas-qujFk-xLGPq0-A-7ZQKw..."; // Use your full Anon key
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const masterWallet = "YOUR_TON_WALLET_ADDRESS_HERE";

    // 3. CAPTURE REFERRER (MLM Tracking)
    const urlParams = new URLSearchParams(window.location.search);

    async function forecast(party, multiplier) {
        tg.HapticFeedback.notificationOccurred('success');

        tg.showConfirm(`Confirm ${party} Forecast (${multiplier}x)?`, async (ok) => {
            if (ok) {
                // This saves the data to the table you just created
                const { error } = await supabase
                    .from('forecasts')
                    .insert([
                        { 
                            user_id: tg.initDataUnsafe.user?.id.toString(), 
                            username: tg.initDataUnsafe.user?.username || "Anonymous",
                            selection: party, 
                            multiplier: multiplier,
                            referrer: referrerId 
                        }
                    ]);

                if (error) {
                    console.error(error);
                    tg.showAlert("Database connection error. Check your API keys.");
                } else {
                    tg.showAlert(`✅ Registered! Send USDT to activate:\n\n${masterWallet}`);
                }
            }
        });
    }
</script>
