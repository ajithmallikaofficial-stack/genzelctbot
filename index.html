<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX VEDA | INSTITUTIONAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #fbbf24; --gold-dark: #b45309; --red: #ef4444; --bg: #020617; --card: #0f172a; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { background: #000; padding: 15px 20px; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .live-status { font-size: 0.65rem; font-weight: 800; color: #22c55e; display: flex; align-items: center; gap: 5px; }
        .dot { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }

        .tabs { display: flex; background: #000; border-bottom: 1px solid #1e293b; }
        .tab { flex: 1; padding: 15px; border: none; background: none; color: #64748b; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); background: #0f172a; }

        .content { padding: 15px; }
        .market-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #1e293b; position: relative; }
        .premium { border: 1.5px solid var(--gold); box-shadow: 0 10px 30px rgba(251, 191, 36, 0.05); }

        .cand-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .cand-img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; background: #1e293b; }

        .sentiment { height: 6px; background: #1e293b; border-radius: 10px; margin: 15px 0; overflow: hidden; display: flex; }
        .fill-nda { background: var(--gold); height: 100%; transition: 1s ease; }
        
        .btn { border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; transition: 0.1s; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), var(--gold-dark)); color: #000; }
        .btn-red { background: transparent; border: 1px solid var(--red); color: var(--red); }
        .btn-blue { background: transparent; border: 1px solid #334155; color: #475569; font-size: 0.8rem; }

        select { background: #1e293b; color: var(--gold); border: 1px solid var(--gold); padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <div><span style="color:var(--gold); font-weight:900; font-size:1.1rem; letter-spacing:-1px;">VOX VEDA</span></div>
        <div class="live-status"><div class="dot"></div> INSTITUTIONAL LIVE</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('global', this)">🌎 State Pool</button>
        <button class="tab" onclick="switchTab('local', this)">📍 Local Nodes</button>
    </div>

    <div class="content">
        <div id="global" class="tab-pane">
            <div class="market-card premium">
                <h3 style="margin:0; font-size:1.2rem;">Kerala Final Victory 2026</h3>
                <div class="sentiment"><div class="fill-nda" style="width:78%"></div></div>
                <button class="btn btn-gold" onclick="order('STATE', 'NDA', 10)"><span>NDA SUPREMACY</span><span>10x</span></button>
                <button class="btn btn-red" onclick="order('STATE', 'LDF', 1.5)"><span>LDF RETENTION</span><span>1.5x</span></button>
                <button class="btn btn-blue" onclick="order('STATE', 'UDF', 0.1)"><span>UDF COALITION</span><span>0.1x</span></button>
            </div>
        </div>

        <div id="local" class="tab-pane" style="display:none;">
            <select id="cSelect" onchange="loadNode()">
                <option value="">SELECT CONSTITUENCY NODE...</option>
                </select>
            <div id="nodeDisplay"></div>
        </div>
    </div>
